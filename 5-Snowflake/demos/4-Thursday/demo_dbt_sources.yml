version: 2

# =============================================================================
# DEMO: dbt Sources Definition
# Day: 4-Thursday
# Purpose: Declare external tables that dbt doesn't manage
# =============================================================================
#
# INSTRUCTOR NOTES:
# Sources tell dbt about tables that exist outside dbt's control.
# This enables:
# - Lineage tracking from raw data
# - Source freshness checks
# - Documentation
#
# KEY BRIDGE: "Sources are like Airflow external task sensors - 
# they represent data you didn't create but depend on."
# =============================================================================

sources:
  - name: bronze
    description: "Raw data landing zone - populated by Snowpipe or COPY INTO"
    database: DEV_DB
    schema: BRONZE
    
    # Optional: Check source freshness
    # Requires a timestamp column in the source table
    freshness:
      warn_after: {count: 24, period: hour}
      error_after: {count: 48, period: hour}
    
    # Loaded timestamp column (for freshness checks)
    loaded_at_field: created_at
    
    tables:
      # Raw events from streaming pipeline
      - name: raw_events
        description: "Raw event data ingested from Snowpipe or batch loads"
        columns:
          - name: event_id
            description: "Unique identifier for each event"
          - name: event_type
            description: "Type of event (click, view, purchase, etc.)"
          - name: payload
            description: "JSON payload with event-specific data"
          - name: created_at
            description: "Timestamp when event was created"
      
      # Raw orders from batch loads (if exists from Tuesday demos)
      - name: loaded_orders
        description: "Orders loaded via COPY INTO"
        columns:
          - name: order_id
            description: "Order identifier"
          - name: customer_id
            description: "Customer who placed the order"
          - name: order_date
            description: "Date of the order"
          - name: amount
            description: "Order amount in dollars"

# =============================================================================
# INSTRUCTOR TALKING POINTS:
#
# 1. "The 'name' under sources is a logical name you choose. It doesn't
#    have to match the schema name (though it's common to do so)."
#
# 2. "database and schema tell dbt WHERE the table lives."
#
# 3. "In your models, you'll reference this as: 
#    {{ source('bronze', 'raw_events') }}"
#
# 4. "Freshness checks are optional but powerful - they alert you when
#    source data is stale. Like monitoring Kafka lag."
#
# 5. "Column descriptions become part of auto-generated documentation."
# =============================================================================
