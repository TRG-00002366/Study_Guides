name: 'snowflake_training'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'snowflake_training'

# These configurations specify where dbt should look for different types of files.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Configuring models
models:
  snowflake_training:
    # Staging models: views (fast to build, compute at query time)
    staging:
      +materialized: view
      +schema: staging
    
    # Mart models: tables (pre-computed, fast to query)
    marts:
      +materialized: table
      +schema: marts
