# Streamlit Secrets Template
# Copy this file to .streamlit/secrets.toml and fill in your credentials
# WARNING: NEVER commit secrets.toml to git — add to .gitignore!

[snowflake]
account = "xy12345.us-east-1"         # Your Snowflake account identifier
user = "your_username"                 # Snowflake username
password = "your_password"             # Snowflake password
warehouse = "COMPUTE_WH"              # Virtual warehouse name
database = "DEV_DB"                    # Database name
schema = "GOLD"                        # Schema name (GOLD layer)
