# models/marts/schema.yml
# ============================================
# Comprehensive dbt test suite for mart models
# Demonstrates all four built-in test types
# plus custom generic tests
# ============================================

version: 2

models:
  # ---------- Customer Dimension ----------
  - name: dim_customers
    description: "Customer dimension table — one row per customer"
    columns:
      - name: customer_key
        description: "Surrogate key for the customer"
        tests:
          - unique
          - not_null

      - name: customer_id
        description: "Natural key from source system"
        tests:
          - unique
          - not_null

      - name: email
        description: "Customer email address"
        tests:
          - unique

      - name: customer_status
        description: "Current customer lifecycle status"
        tests:
          - not_null
          - accepted_values:
              values: ['active', 'inactive', 'churned']

  # ---------- Order Fact ----------
  - name: fct_orders
    description: "Fact table for orders — one row per order"
    columns:
      - name: order_key
        description: "Surrogate key for the order"
        tests:
          - unique
          - not_null

      - name: customer_key
        description: "Foreign key to dim_customers"
        tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_key

      - name: order_total
        description: "Total order amount in dollars"
        tests:
          - not_null
          - positive_value   # Custom generic test

      - name: order_status
        description: "Current order status"
        tests:
          - not_null
          - accepted_values:
              values: ['pending', 'shipped', 'delivered', 'cancelled', 'returned']

  # ---------- Line Item Fact ----------
  - name: fct_line_items
    description: "Fact table for order line items"
    columns:
      - name: line_item_key
        description: "Surrogate key for the line item"
        tests:
          - unique
          - not_null

      - name: order_key
        description: "Foreign key to fct_orders"
        tests:
          - not_null
          - relationships:
              to: ref('fct_orders')
              field: order_key

      - name: product_key
        description: "Foreign key to dim_products"
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_key

      - name: quantity
        description: "Number of units ordered"
        tests:
          - not_null
          - positive_value
